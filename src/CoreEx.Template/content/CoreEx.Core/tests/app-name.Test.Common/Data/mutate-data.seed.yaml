# Mutate test dataset for the 'domain-name' domain — loaded by the XxxMutateTests classes via:
#   MigrateXxxDataAsync<TestData>(["mutate-data.seed.yaml"], DbMigration.ConfigureMigrationArgs)
#
# Contains the BASELINE rows that POST/PUT/PATCH/DELETE tests act on — e.g. a row to update, a row
# to delete, an existing SKU/key for a duplicate-conflict test. Kept separate from
# 'read-data.seed.yaml' so mutations never disturb read expectations.
#
# DbEx YAML format: schema (top-level) -> '- <table>:' (array item, note the leading '-') -> rows.
#   * Identifiers and GUID foreign-keys use '^N' (deterministic: ^1 == 1.ToGuid()).
#   * Reference data is linked by CODE (e.g. gender_code: M), never by id/FK.
#   * Set scenario flags explicitly where a test needs them (e.g. is_deleted: true).
#   * Schema, table, AND column names must match the database's ACTUAL casing (what the migration created):
#       - PostgreSQL (default): lowercase snake_case  (schema 'bar', table 'employee', column 'employee_id')
#       - SQL Server:           PascalCase            (schema 'Bar', table 'Employee', column 'EmployeeId')
#     A wrong-cased schema/table fails the seed with "Table '...' does not exist".
#   * Give each DESTRUCTIVE test its own '^N' row (Update/Delete/Patch target different ids; NUnit randomises order).
#
# Example (PostgreSQL — replace with your domain's schema/tables/rows):
#
# bar:
#   - employee:
#     - { employee_id: ^1, first_name: Bob, last_name: Smith, gender_code: M, salary: 50000, date_of_birth: 1990-01-01 }
#     - { employee_id: ^2, first_name: Jane, last_name: Doe, gender_code: F, salary: 60000, date_of_birth: 1985-06-15 }
