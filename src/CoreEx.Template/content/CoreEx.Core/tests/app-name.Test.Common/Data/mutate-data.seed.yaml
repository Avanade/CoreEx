# Mutate test dataset for the 'domain-name' domain — loaded by the XxxMutateTests classes via:
#   MigrateXxxDataAsync<TestData>(["mutate-data.seed.yaml"], DbMigration.ConfigureMigrationArgs)
#
# Contains the BASELINE rows that POST/PUT/PATCH/DELETE tests act on — e.g. a row to update, a row
# to delete, an existing SKU/key for a duplicate-conflict test. Kept separate from
# 'read-data.seed.yaml' so mutations never disturb read expectations.
#
# DbEx YAML format: schema (top-level) -> '- <Table>:' (array item, note the leading '-') -> rows.
#   * Identifiers and GUID foreign-keys use '^N' (deterministic: ^1 == 1.ToGuid()).
#   * Reference data is linked by CODE (e.g. GenderCode: M), never by id/FK.
#   * Set scenario flags explicitly where a test needs them (e.g. IsDeleted: true).
#
# Example (replace with your domain's tables and rows):
#
# domain-name:
#   - Employee:
#     - { EmployeeId: ^1, FirstName: Bob, LastName: Smith, GenderCode: M, Salary: 50000, DateOfBirth: 1990-01-01 }
#     - { EmployeeId: ^2, FirstName: Jane, LastName: Doe, GenderCode: F, Salary: 60000, DateOfBirth: 1985-06-15 }
